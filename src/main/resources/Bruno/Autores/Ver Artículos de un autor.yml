info:
  name: Ver Artículos de un autor
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8080/api/autores/1/articulos?page=0&size=2&sort=titulo,asc
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "2"
      type: query
    - name: sort
      value: titulo,asc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
